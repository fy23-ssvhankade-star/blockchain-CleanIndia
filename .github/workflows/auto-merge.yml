name: Auto Merge PRs from rohanExploit

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'rohanExploit' || github.event.pull_request.user.login == 'fy23-ssvhankade-star'
    steps:
      - name: Enable Auto Merge
        run: gh pr merge --merge --admin "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}